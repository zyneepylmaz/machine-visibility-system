<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Machine Order</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        .container {
            max-width: 700px;
            background: white;
            padding: 24px;
            border-radius: 8px;
        }
        h1 {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 16px;
            text-decoration: none;
            border-radius: 6px;
            background: #1f6feb;
            color: white;
            border: none;
            cursor: pointer;
        }
        .back {
            background: #777;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Machine Order</h1>

    <form th:action="@{/orders}" th:object="${machineOrder}" method="post">
        <label>Order Code</label>
        <input type="text" th:field="*{orderCode}" required>

        <label>Machine Name</label>
        <input type="text" th:field="*{machineName}" required>

        <label>Owner Name</label>
        <input type="text" th:field="*{ownerName}" required>

        <label>Sale Type</label>
        <input type="text" th:field="*{saleType}" placeholder="SALE or RENTAL">

        <label>Visibility Type</label>
        <select th:field="*{visibilityType}">
            <option th:each="visibility : ${visibilityTypes}"
                    th:value="${visibility}"
                    th:text="${visibility}">
            </option>
        </select>

        <button class="btn" type="submit">Save</button>
        <a class="btn back" th:href="@{/orders}">Back</a>
    </form>
</div>

</body>
</html>
